# Render.com — backend only (https://render.com)
services:
  - type: web
    name: review-rating-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_URI_DIRECT
        sync: false
      - key: FRONTEND_URL
        sync: false
